services:
  postgres:
    image: postgres:16-alpine
    container_name: clay-postgres
    environment:
      POSTGRES_USER: clayworkshop
      POSTGRES_PASSWORD: clayworkshop123
      POSTGRES_DB: clayworkshop
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clayworkshop -d clayworkshop"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clay-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clay-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - clay-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: clay-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      TZ: Asia/Shanghai
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clay-network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: clay-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - clay-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clay-api
    env_file:
      - .env.example
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      SMTP_HOST: mailhog
      C_FORCE_ROOT: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - .:/app
    networks:
      - clay-network
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clay-celery-worker
    entrypoint: ["/app/celery_worker.sh"]
    env_file:
      - .env.example
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      SMTP_HOST: mailhog
      C_FORCE_ROOT: "true"
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - clay-network
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clay-celery-beat
    entrypoint: ["/app/celery_beat.sh"]
    env_file:
      - .env.example
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      SMTP_HOST: mailhog
      C_FORCE_ROOT: "true"
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - clay-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  clay-network:
    driver: bridge
